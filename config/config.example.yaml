# 广告推荐系统配置文件示例
# 请复制此文件为 config.yaml 并修改相应配置

server:
  host: "0.0.0.0"
  port: 8888

database:
  host: "localhost"
  port: 3306
  user: "root"
  password: "your_password_here"  # 请修改为实际密码
  dbname: "advert_recommend"
  charset: "utf8mb4"
  # 连接池配置
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime: 3600  # 秒

# 日志配置
log:
  level: "info"  # debug, info, warn, error
  output: "stdout"  # stdout, file
  file_path: "logs/app.log"

# 性能配置
performance:
  read_timeout: 30  # 秒
  write_timeout: 30  # 秒
  idle_timeout: 60  # 秒
